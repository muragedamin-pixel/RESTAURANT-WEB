<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — REAL Restaurant</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Cinzel:wght@400;700&family=Lato:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:      #1a3a2a;
      --green-dark: #0f2318;
      --gold:       #c9a84c;
      --gold-light: #e8cc7a;
      --cream:      #faf6ee;
      --text:       #1a1a1a;
      --text-muted: #6a5a4a;
      --border:     #e0d8c8;
      --red:        #c0392b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--green-dark);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem;
    }

    /* ── CARD ── */
    .login-card {
      background: var(--cream);
      border: 1px solid rgba(201,168,76,.3);
      border-radius: 12px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      overflow: hidden;
    }
    .login-header {
      background: var(--green-dark);
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      border-bottom: 2px solid var(--gold);
    }
    .login-header .ornament { font-size: 1.4rem; color: var(--gold); letter-spacing: .4em; margin-bottom: .8rem; }
    .login-header h1 {
      font-family: 'Cinzel', serif; font-size: 1.6rem;
      letter-spacing: .25em; color: var(--gold);
    }
    .login-header p { font-size: .78rem; color: rgba(250,246,238,.5); letter-spacing: .1em; margin-top: .3rem; }

    .login-body { padding: 2rem; }

    /* ── TABS ── */
    .auth-tabs {
      display: flex; gap: 0; margin-bottom: 1.8rem;
      border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
    }
    .auth-tab {
      flex: 1; padding: .6rem; text-align: center;
      font-size: .78rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; cursor: pointer;
      background: transparent; border: none; color: var(--text-muted);
      transition: all .2s;
    }
    .auth-tab.active { background: var(--green-dark); color: var(--gold); }

    /* ── FORM ── */
    .form-group { margin-bottom: 1.1rem; }
    .form-group label {
      display: block; font-size: .72rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: .4rem;
    }
    .form-group input {
      width: 100%; padding: .75rem 1rem;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-family: 'Lato', sans-serif; font-size: .9rem;
      background: #fff; color: var(--text);
      transition: border-color .2s;
    }
    .form-group input:focus { outline: none; border-color: var(--gold); }

    .submit-btn {
      width: 100%; padding: .9rem;
      background: var(--gold); color: var(--green-dark);
      border: none; border-radius: 6px;
      font-family: 'Lato', sans-serif; font-size: .85rem;
      font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      cursor: pointer; transition: background .2s; margin-top: .5rem;
    }
    .submit-btn:hover { background: var(--gold-light); }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; }

    .error-msg {
      background: #fdecea; color: var(--red);
      border: 1px solid #f5b7b1; border-radius: 6px;
      padding: .7rem 1rem; font-size: .82rem;
      margin-bottom: 1rem; display: none;
    }
    .error-msg.show { display: block; }

    .divider {
      text-align: center; margin: 1.2rem 0;
      font-size: .72rem; color: var(--text-muted); letter-spacing: .1em;
      position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: 40%; height: 1px; background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .back-link {
      display: block; text-align: center; margin-top: 1.2rem;
      font-size: .78rem; color: var(--text-muted); text-decoration: none;
    }
    .back-link:hover { color: var(--green); }

    /* staff hint box */
    .staff-hint {
      background: rgba(15,35,24,.06);
      border: 1px solid var(--border); border-radius: 6px;
      padding: .9rem 1rem; margin-bottom: 1.2rem;
    }
    .staff-hint h4 {
      font-size: .72rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: .5rem;
    }
    .staff-hint table { width: 100%; border-collapse: collapse; }
    .staff-hint td {
      font-size: .75rem; color: var(--text-muted); padding: .15rem 0;
    }
    .staff-hint td:first-child { font-weight: 700; color: var(--green); width: 80px; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-header">
      <div class="ornament">✦</div>
      <h1>REAL</h1>
      <p>RESTAURANT & HOTEL</p>
    </div>

    <div class="login-body">

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="showTab('login')">Sign In</button>
        <button class="auth-tab"        id="tab-register" onclick="showTab('register')">Register</button>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <!-- LOGIN FORM -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <button class="submit-btn" id="login-btn" type="submit">Sign In</button>
      </form>

      <!-- REGISTER FORM -->
      <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 6 characters" required />
        </div>
        <button class="submit-btn" id="reg-btn" type="submit">Create Account</button>
      </form>

      <div class="divider">or</div>

      <!-- STAFF DEMO HINTS -->
      <div class="staff-hint">
        <h4>Staff Demo Accounts</h4>
        <table>
          <tr><td>Kitchen</td><td>kitchen@real.co.ke / kitchen123</td></tr>
          <tr><td>Waiter</td><td>waiter@real.co.ke / waiter123</td></tr>
          <tr><td>Manager</td><td>manager@real.co.ke / manager123</td></tr>
        </table>
      </div>

      <a class="back-link" href="index.html">← Back to Main Site</a>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3000/api';

    function showTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
      showError('');
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.toggle('show', !!msg);
    }

    function redirectAfterLogin(user) {
      // Staff go to their specific dashboard, customers go back to main site
      const routes = {
        kitchen: 'kitchen.html',
        waiter:  'waiter.html',
        manager: 'manager.html',
        customer: 'index.html'
      };
      window.location.href = routes[user.role] || 'index.html';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      showError('');

      try {
        const res  = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('login-email').value,
            password: document.getElementById('login-password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        // Store token and user info
        localStorage.setItem('rr_token', data.token);
        localStorage.setItem('rr_user',  JSON.stringify(data.user));

        redirectAfterLogin(data.user);
      } catch (err) {
        showError(err.message);
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('reg-btn');
      btn.disabled = true; btn.textContent = 'Creating account…';
      showError('');

      try {
        const res  = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name:     document.getElementById('reg-name').value,
            email:    document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        localStorage.setItem('rr_token', data.token);
        localStorage.setItem('rr_user',  JSON.stringify(data.user));

        redirectAfterLogin(data.user);
      } catch (err) {
        showError(err.message);
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }

    // If already logged in, redirect
    const existingUser = JSON.parse(localStorage.getItem('rr_user') || 'null');
    if (existingUser && localStorage.getItem('rr_token')) {
      redirectAfterLogin(existingUser);
    }
  </script>
</body>
</html>
